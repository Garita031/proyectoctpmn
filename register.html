<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/register.css">
    <title>Login - CTP Mercedes Norte</title>
</head>
<body class="body-login">
 

<form action="register.php" method="post" enctype="multipart/form-data">
    <div class="form">
    <img src="img/logo.png" class="logo">
    <h2>Registro</h2>
    <div class="registrer">
    <input type="email" class="user" placeholder="Email" name="email">
    <br>
    <br>
    <input type="text" class="pass" placeholder="Contraseña" name="pass">
    <br>
    <br>
    <input type="text" class="pass" placeholder="Nombre" name="nombre">
    <br>
    <br>
    <input type="text" class="pass" placeholder="Cedula" name="id">
    <br>
    <br>
    <input type="text" class="pass" placeholder="Grupo Profesional" name="prof_group">
    <br>
    <br>
    <input type="text" class="pass" placeholder="Puesto" name="job">
    <br>
    <br>
    <input type="text" class="pass" placeholder="Condicion" name="condition">
    <br>
    <br>
    <select id="rol" name="rol">
        <option name="rol" value="" disabled selected>Rol</option>
        <option name="rol" value="admin">Administrativo</option>
        <option name="rol" value="profesor">Profesor</option>
    </select>
    </div>
    <button type="submit" class="ingresar">Registrarse</button>
</div>
 
</form>

</body>
</html>
