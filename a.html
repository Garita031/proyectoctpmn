<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú desplegable</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 50px;
    }

    /* Estilo del contenedor del botón */
    .dropdown {
      position: relative;
      display: inline-block;
    }

    /* Estilo del botón */
    .dropdown button {
      background-color: #3498db;
      color: white;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      cursor: pointer;
    }

    /* Contenedor del menú oculto por defecto */
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f1f1f1;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      z-index: 1;
    }

    /* Estilo de los elementos del menú */
    .dropdown-content a {
      color: black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
    }

    /* Cambia el color al pasar el ratón por los links */
    .dropdown-content a:hover {
      background-color: #ddd;
    }

    /* Mostrar el menú al pasar el ratón por el contenedor */
    .dropdown:hover .dropdown-content {
      display: block;
    }
  </style>
</head>
<body>

  <div class="dropdown">
    <button>Menú</button>
    <div class="dropdown-content">
      <a href="#">Opción 1</a>
      <a href="#">Opción 2</a>
      <a href="#">Opción 3</a>
    </div>
  </div>

</body>
</html>
